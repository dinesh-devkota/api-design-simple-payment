services:
  redis:
    image: redis:7-alpine
    container_name: customer-care-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
  redisinsight:
    image: redis/redisinsight:latest
    container_name: customer-care-redisinsight
    ports:
      - "5540:5540"
    depends_on:
      - redis

volumes:
  redis-data:
